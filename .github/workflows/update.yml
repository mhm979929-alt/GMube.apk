name: Update Counter
on:
  repository_dispatch:
    types: [download]
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Update JSON
        run: |
          count=$(jq '.downloads' counter.json)
          new_count=$((count + 1))
          echo "{\"downloads\": $new_count}" > counter.json
      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add counter.json
          git commit -m "Update count" || echo "No changes"
          git push
