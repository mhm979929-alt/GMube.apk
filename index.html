<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMube Edu - تحميل التطبيق</title>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { background: #1e1e1e; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 400px; width: 90%; }
        h1 { color: #4CAF50; margin-bottom: 10px; }
        .subtitle { color: #b0b0b0; margin-bottom: 30px; }
        .download-btn { background-color: #4CAF50; color: white; padding: 15px 30px; text-decoration: none; border-radius: 30px; font-weight: bold; display: inline-block; margin-bottom: 20px; transition: 0.3s; cursor: pointer;}
        .download-btn:hover { background-color: #45a049; transform: scale(1.05); }
        .counter-box { background: #2d2d2d; padding: 15px; border-radius: 10px; border: 1px solid #4CAF50; }
        .counter-number { font-size: 28px; font-weight: bold; color: #4CAF50; }
        .counter-label { font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <div class="container">
        <h1>GMube Edu</h1>
        <p class="subtitle">نافذة الطلاب والمعلمين، تعلّم بذكاء.</p>
        
        <!-- ضع رابط ملف APK الخاص بك هنا -->
        <a href="https://drive.google.com/your-apk-link-here.apk" class="download-btn" id="downloadBtn">📥 تحميل التطبيق الآن</a>
        
        <div class="counter-box">
            <div class="counter-number" id="downloadCount">جاري التحميل...</div>
            <div class="counter-label">إجمالي مرات التحميل</div>
        </div>
    </div>

    <!-- استخدام طريقة Modules لضمان عدم وجود أخطاء -->
    <script type="importmap">
        {
            "imports": {
                "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
            }
        }
    </script>

    <script type="module">
        // استيراد المكتبة من الرابط أعلاه
        import { createClient } from '@supabase/supabase-js';

        // ⚠️ ضع مفاتيح مشروعك هنا (من إعدادات > API في Supabase)
        const SUPABASE_URL = "https://rmtaxqowryheatrntcrs.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtdGF4cW93cnloZWF0cm50Y3JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NDIzNzEsImV4cCI6MjA5NzQxODM3MX0.Ky0Vw6PnQz7R9bFQL4i-J0smkWhefK1VnueGE6i1g9M"; // يبدأ بـ eyJ...

        // إنشاء الاتصال بقاعدة البيانات
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // دالة زيادة العداد عند الضغط على زر التحميل
        window.triggerDownload = async function() {
            try {
                const { data, error } = await supabase
                    .from('downloads')
                    .select('count')
                    .eq('id', 1)
                    .single();

                if (error) throw error;

                let newCount = data.count + 1;
                
                const { error: updateError } = await supabase
                    .from('downloads')
                    .update({ count: newCount })
                    .eq('id', 1);

                if (updateError) throw updateError;

                document.getElementById('downloadCount').innerText = newCount;
                
            } catch (err) {
                console.error("خطأ عند التحميل:", err);
            }
        }

        // دالة عرض العداد عند فتح الصفحة لأول مرة
        window.onload = async function() {
            try {
                const { data, error } = await supabase
                    .from('downloads')
                    .select('count')
                    .eq('id', 1)
                    .single();

                if (error) throw error;

                if (data) {
                    document.getElementById('downloadCount').innerText = data.count;
                }
            } catch (err) {
                console.error("خطأ في تحميل العداد:", err);
                document.getElementById('downloadCount').innerText = "0";
            }
        }
    </script>
</body>
</html>
