<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMube Edu</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { background: #1e1e1e; padding: 40px; border-radius: 20px; max-width: 400px; width: 90%; }
        h1 { color: #4CAF50; }
        .download-btn { background-color: #4CAF50; color: white; padding: 15px 30px; border-radius: 30px; font-weight: bold; display: inline-block; margin-bottom: 20px; cursor: pointer; text-decoration: none;}
        .counter-box { background: #2d2d2d; padding: 15px; border-radius: 10px; border: 1px solid #4CAF50; }
        .counter-number { font-size: 28px; font-weight: bold; color: #4CAF50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GMube Edu</h1>
        <p style="color: #b0b0b0;">نافذة الطلاب والمعلمين</p>
        
        <!-- ضع رابط ملف APK الخاص بك هنا بدلاً من # -->
        <a href="#" class="download-btn" onclick="triggerDownload()">📥 تحميل التطبيق</a>
        
        <div class="counter-box">
            <div class="counter-number" id="downloadCount">جاري التحميل...</div>
            <div class="counter-label">إجمالي التحميلات</div>
        </div>
    </div>

    <script>
        // ⚠️ خطوة مهمة جداً: استبدل "اسم_مستخدمك" و "اسم_المستودع" بمعلومات حسابك
        const REPO_OWNER = "mhm979929-alt";
        const REPO_NAME = "GMube.apk";
        const JSON_URL = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/counter.json`;

        // دالة زيادة العداد
        function triggerDownload() {
            // نزيد الرقم للمستخدم في الصفحة فوراً
            let currentNum = parseInt(document.getElementById('downloadCount').innerText);
            if(!isNaN(currentNum)) {
                document.getElementById('downloadCount').innerText = currentNum + 1;
            }

            // نرسل إشارة لـ GitHub Action ليزيد الرقم في ملف JSON الحقيقي
            fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
                method: 'POST',
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': 'Bearer YOUR_GITHUB_TOKEN', // سنتعامل مع هذا في الخطوة التالية
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ "event_type": "download" })
            });
        }

        // دالة عرض العداد عند فتح الصفحة
        window.onload = async function() {
            try {
                const response = await fetch(JSON_URL);
                const data = await response.json();
                document.getElementById('downloadCount').innerText = data.downloads;
            } catch {
                document.getElementById('downloadCount').innerText = "0";
            }
        }
    </script>
</body>
</html>
